<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Rainbow Landscaping</title>
  <meta name="description" content="Thank you for requesting a free landscaping or sprinkler estimate from Rainbow Landscaping." />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(7, 28, 14, 0.78), rgba(7, 28, 14, 0.86)),
        url("./assets/images/rainbow-landscaping-sprinkler-hero.jpg") center/cover no-repeat;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .thank-you-card {
      width: min(720px, 100%);
      background: rgba(8, 38, 18, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: clamp(32px, 7vw, 64px);
      text-align: center;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(14px);
    }

    .thank-you-logo {
      display: inline-block;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #baf7c9;
      margin-bottom: 22px;
    }

    .thank-you-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #71d36f;
      color: #082612;
      font-size: 36px;
      font-weight: 900;
      box-shadow: 0 0 36px rgba(113, 211, 111, 0.42);
    }

    .thank-you-card h1 {
      font-size: clamp(2.4rem, 8vw, 4.6rem);
      line-height: 0.95;
      margin-bottom: 18px;
      color: #ffffff;
    }

    .thank-you-card p {
      max-width: 560px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.86);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .thank-you-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .thank-you-actions .btn,
    .thank-you-actions .btn-primary {
      min-width: 180px;
    }

    .thank-you-meta {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.72);
    }

    @media (max-width: 520px) {
      .thank-you-actions .btn,
      .thank-you-actions .btn-primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="thank-you-card">
    <span class="thank-you-logo">Rainbow Landscaping</span>
    <div class="thank-you-icon" aria-hidden="true">✓</div>
    <h1>Thank you!</h1>
    <p>Your free estimate request was submitted successfully. Carlos with Rainbow Landscaping will review your project details and contact you shortly.</p>
    <div class="thank-you-actions">
      <a class="btn-primary" href="https://rainbowlandscapingutah.com/">Back to Website</a>
      <a class="btn secondary" href="tel:3853497297">Call Now</a>
      <a class="btn secondary" href="sms:3853497297">Text Now</a>
    </div>
    <div class="thank-you-meta">Free estimates • Landscaping • Sprinklers • Utah Valley</div>
  </main>
</body>
</html>
